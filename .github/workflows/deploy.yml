name: 部署到 GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate index scripts
        run: |
          awk '/<script>/{n++; out="/tmp/zhenbao-script-" n ".js"; in_script=1; next} /<\/script>/{in_script=0; next} in_script{print > out}' index.html
          for file in /tmp/zhenbao-script-*.js; do
            [ -s "$file" ] && node --check "$file"
          done
      - name: Inject Token
        run: sed -i "s/__GITHUB_TOKEN__/${{ secrets.GH_PAGES_TOKEN }}/g" index.html
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
