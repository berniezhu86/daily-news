name: 自动更新新闻
on:
  schedule:
    # 每 3 小时自动更新新闻与静态股市数据（北京时间约 02/05/08/11/14/17/20/23 点）
    - cron: '0 */3 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAGES_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python generate_source_html.py
      - run: python extract_news.py
      - run: python news_pipeline.py
      - run: python update_stock_data.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || (git commit -m "auto: 定时更新新闻与股市数据" && git push)
