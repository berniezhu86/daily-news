name: 自动更新新闻
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAGES_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Inject Token for syncToGitHub function
        run: sed -i "s/__GITHUB_TOKEN__/${{ secrets.GH_PAGES_TOKEN }}/g" index.html
      - run: python extract_news.py
      - run: python update_stock_data.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || (git commit -m "auto: 定时更新新闻与股市数据" && git push)
